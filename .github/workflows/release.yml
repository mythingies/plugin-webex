name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o "webex-mcp${ext}" ./cmd/webex-mcp/

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "$GOOS" = "windows" ]; then
            zip "webex-mcp-${GOOS}-${GOARCH}.zip" webex-mcp.exe
          else
            tar -czf "webex-mcp-${GOOS}-${GOARCH}.tar.gz" webex-mcp
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webex-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: webex-mcp-*.tar.gz
          if-no-files-found: ignore

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: webex-mcp-${{ matrix.goos }}-${{ matrix.goarch }}-zip
          path: webex-mcp-*.zip
          if-no-files-found: ignore

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum webex-mcp-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/webex-mcp-*.tar.gz
            dist/webex-mcp-*.zip
            dist/checksums.txt
